# Link checker — runs weekly and on PRs touching markdown
name: Link Check (lychee)

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  pull_request:
    paths: ["**.md"]
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 7d
            --exclude-mail
            --exclude "^https://tryhackme\\.com"
            --exclude "^https://www\\.linkedin\\.com"
            "**/*.md"
          fail: false  # Advisory — don't block PRs on transient link rot

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee/out.md
          retention-days: 30
