# Shell script linter — runs on PRs touching shell scripts
name: ShellCheck

on:
  pull_request:
    paths: ["**.sh"]
  push:
    paths: ["**.sh"]
    branches: [master]
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: warning
